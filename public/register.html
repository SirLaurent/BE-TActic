<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🪖 BE TActic - Registrati</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="tactical-theme">
    <div class="login-container">
      <div class="login-header">
        <h1>🪖 Unisciti a BE TActic</h1>
        <p>Crea il tuo profilo giocatore</p>
      </div>

      <form id="registerForm" class="login-form">
        <div class="form-group">
          <label for="nickname">Nickname *</label>
          <input
            type="text"
            id="nickname"
            name="nickname"
            required
            placeholder="es. ShadowRecon"
            maxlength="20"
          />
          <small>Solo lettere, numeri e underscore. Max 20 caratteri.</small>
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="tu@email.com"
          />
        </div>

        <div class="form-group">
          <label for="password">Password *</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            minlength="8"
            placeholder="Minimo 8 caratteri"
          />
          <small>Usa maiuscole, numeri e simboli per maggiore sicurezza.</small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Conferma Password *</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            required
            placeholder="Ripeti la password"
          />
        </div>

        <button type="submit" class="btn-primary">✅ Crea Account</button>
      </form>

      <div class="login-footer">
        <p>Hai già un account? <a href="/login.html">Accedi</a></p>
      </div>
    </div>

    <script src="/js/register.js"></script>
  </body>
</html>
