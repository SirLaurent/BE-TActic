<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🪖 BE TACTIC - Squadre</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .teams-blg {
        max-width: 900px;
        margin: 1rem auto;
        padding: 0 1rem;
      }
      .teams-header-blg {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .teams-header-blg h1 {
        color: var(--accent-orange);
        font-size: 1.8rem;
      }
      .my-team-blg,
      .create-team-blg,
      .teams-list-blg {
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 1.2rem;
        margin-bottom: 1rem;
      }
      .create-team-blg input,
      .create-team-blg textarea {
        width: 100%;
        margin-bottom: 0.8rem;
        padding: 0.7rem;
        background: #0a0a0a;
        border: 1px solid #333;
        color: var(--text-white);
        border-radius: 2px;
        font-family: var(--font-main);
      }
      .create-team-blg textarea {
        height: 80px;
        resize: vertical;
      }
      .btn-create {
        background: var(--accent-orange);
        color: #000;
        border: none;
        padding: 0.6rem 1.2rem;
        font-family: var(--font-main);
        font-weight: 700;
        cursor: pointer;
        border-radius: 2px;
        text-transform: uppercase;
      }
      .btn-create:hover {
        background: var(--accent-gold);
      }
      .team-card-blg {
        background: #111;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 1rem;
        margin-bottom: 0.8rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .team-info-blg h4 {
        color: var(--accent-orange);
        margin: 0 0 0.3rem;
      }
      .team-info-blg p {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin: 0;
      }
      .btn-join {
        background: transparent;
        border: 1px solid var(--accent-orange);
        color: var(--accent-orange);
        padding: 0.4rem 1rem;
        border-radius: 2px;
        cursor: pointer;
        font-family: var(--font-main);
        text-transform: uppercase;
        font-size: 0.8rem;
        transition: 0.2s;
      }
      .btn-join:hover {
        background: var(--accent-orange);
        color: #000;
      }
      .btn-join:disabled {
        border-color: #444;
        color: #444;
        cursor: not-allowed;
      }
      .member-list-blg {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app-navbar"></div>
    <main class="teams-blg">
      <header class="teams-header-blg">
        <h1>🏴 CENTRO COMANDO SQUADRE</h1>
        <p style="color: #888">Crea, cerca o unisciti a un clan tattico</p>
      </header>
      <section id="myTeamSection" class="my-team-blg hidden">
        <h3 style="color: var(--accent-orange); margin: 0 0 0.5rem">
          🪖 LA TUA SQUADRA
        </h3>
        <div id="myTeamInfo"></div>
      </section>
      <section class="create-team-blg">
        <h3 style="color: var(--text-white); margin: 0 0 0.8rem">
          ➕ CREA NUOVA SQUADRA
        </h3>
        <form id="createTeamForm">
          <input
            type="text"
            id="teamName"
            placeholder="NOME SQUADRA"
            required
            maxlength="30"
          />
          <textarea
            id="teamDesc"
            placeholder="DESCRIZIONE TATTICA..."
            required
            maxlength="200"
          ></textarea>
          <input
            type="number"
            id="teamMax"
            placeholder="MEMBRI MAX"
            value="20"
            min="5"
            max="50"
          />
          <button type="submit" class="btn-create">🚀 CREA SQUADRA</button>
        </form>
      </section>
      <section class="teams-list-blg">
        <h3 style="color: var(--text-white); margin: 0 0 0.8rem">
          📋 SQUADRE DISPONIBILI
        </h3>
        <div id="teamsListContainer">⏳ Caricamento...</div>
      </section>
    </main>
    <script src="/js/team.js"></script>
    <script src="/js/navbar.js"></script>
  </body>
</html>
