<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🪖 BE TACTIC - Mappa Eventi</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .events-blg {
        display: flex;
        height: calc(100vh - 60px);
        gap: 1rem;
        padding: 1rem;
      }
      .map-container-blg {
        flex: 1;
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid var(--border-color);
      }
      .events-panel-blg {
        width: 320px;
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 1rem;
        overflow-y: auto;
      }
      .events-panel-blg h3 {
        color: var(--accent-orange);
        margin: 0 0 0.8rem;
        font-size: 1rem;
      }
      .events-panel-blg input,
      .events-panel-blg textarea {
        width: 100%;
        margin-bottom: 0.8rem;
        padding: 0.7rem;
        background: #0a0a0a;
        border: 1px solid #333;
        color: var(--text-white);
        border-radius: 2px;
        font-family: var(--font-main);
      }
      .events-panel-blg textarea {
        height: 80px;
        resize: vertical;
      }
      .hint-blg {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
      }
      .btn-event {
        width: 100%;
        padding: 0.7rem;
        background: var(--accent-orange);
        color: #000;
        border: none;
        font-family: var(--font-main);
        font-weight: 700;
        cursor: pointer;
        border-radius: 2px;
        text-transform: uppercase;
      }
      .btn-event:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .divider-blg {
        border: none;
        border-top: 1px solid #333;
        margin: 1rem 0;
      }
      .event-item-blg {
        background: #111;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 0.8rem;
        margin-bottom: 0.8rem;
      }
      .event-item-blg h4 {
        color: var(--accent-orange);
        margin: 0 0 0.3rem;
        font-size: 0.95rem;
      }
      .event-item-blg p {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin: 0.2rem 0;
      }
      .btn-join-event {
        width: 100%;
        margin-top: 0.5rem;
        padding: 0.5rem;
        background: transparent;
        border: 1px solid var(--accent-orange);
        color: var(--accent-orange);
        border-radius: 2px;
        cursor: pointer;
        font-family: var(--font-main);
        text-transform: uppercase;
        font-size: 0.8rem;
      }
      .btn-join-event:hover {
        background: var(--accent-orange);
        color: #000;
      }
      .btn-join-event:disabled {
        border-color: #444;
        color: #444;
        cursor: not-allowed;
      }
      @media (max-width: 768px) {
        .events-blg {
          flex-direction: column;
        }
        .events-panel-blg {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-navbar"></div>
    <main class="events-blg">
      <div id="map" class="map-container-blg"></div>
      <aside class="events-panel-blg">
        <h3>📌 CREA EVENTO</h3>
        <form id="eventForm">
          <input
            type="text"
            id="eventTitle"
            placeholder="NOME PARTITA/EVENTO"
            required
            maxlength="50"
          />
          <textarea
            id="eventDesc"
            placeholder="DESCRIZIONE..."
            maxlength="300"
          ></textarea>
          <label
            style="
              font-size: 0.8rem;
              color: #888;
              display: block;
              margin-bottom: 0.3rem;
            "
            >📅 DATA E ORA</label
          >
          <input type="datetime-local" id="eventDate" required />
          <input type="hidden" id="eventLat" />
          <input type="hidden" id="eventLng" />
          <p id="coordsHint" class="hint-blg">
            📍 Clicca sulla mappa per posizionare
          </p>
          <button type="submit" class="btn-event" id="createEventBtn" disabled>
            🚀 PUBBLICA EVENTO
          </button>
        </form>
        <hr class="divider-blg" />
        <h4 style="color: var(--text-white); margin: 0 0 0.8rem">
          📋 PROSSIMI EVENTI
        </h4>
        <div id="eventsList">⏳ Caricamento...</div>
      </aside>
    </main>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/events.js"></script>
    <script src="/js/navbar.js"></script>
  </body>
</html>
