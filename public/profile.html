<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🪖 BE TACTIC - Profilo</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .profile-battlelog {
        max-width: 1000px;
        margin: 1rem auto;
        padding: 0 1rem;
      }
      .profile-header-blg {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 1.5rem;
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        padding: 1.5rem;
        border-radius: 4px;
        margin-bottom: 1rem;
      }
      .avatar-blg {
        width: 100px;
        height: 100px;
        background: #222;
        border: 2px solid var(--accent-orange);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        position: relative;
      }
      .avatar-edit {
        position: absolute;
        bottom: -5px;
        right: -5px;
        background: var(--accent-orange);
        color: #000;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 0.8rem;
      }
      .profile-info-blg h2 {
        color: var(--accent-gold);
        font-size: 1.5rem;
        margin: 0;
      }
      .profile-info-blg .bio {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin: 0.5rem 0;
        text-transform: none;
      }
      .profile-stats-blg {
        display: flex;
        gap: 2rem;
        margin-top: 1rem;
      }
      .stat-box {
        text-align: center;
      }
      .stat-box .num {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-white);
      }
      .stat-box .label {
        font-size: 0.75rem;
        color: var(--text-muted);
      }
      .team-banner-blg {
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 1rem;
      }
      .team-banner-blg img {
        width: 100%;
        height: 120px;
        object-fit: cover;
        opacity: 0.8;
      }
      .team-info-blg {
        padding: 0.8rem 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .team-name-blg {
        color: var(--accent-orange);
        font-weight: 700;
        font-size: 1.1rem;
      }
      .subteams-blg {
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      .posts-grid-blg {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 4px;
      }
      .post-card-blg {
        aspect-ratio: 1/1;
        background: #111;
        border-radius: 2px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
        border: 1px solid #222;
        transition: border-color 0.2s;
      }
      .post-card-blg:hover {
        border-color: var(--accent-orange);
      }
      .post-card-blg img,
      .post-card-blg video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .post-overlay-blg {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
        color: white;
        padding: 0.5rem;
        font-size: 0.8rem;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .post-card-blg:hover .post-overlay-blg {
        opacity: 1;
      }
      .avatar-selector-blg {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }
      .avatar-selector-blg span {
        font-size: 1.3rem;
        cursor: pointer;
        padding: 0.2rem;
        border-radius: 2px;
      }
      .avatar-selector-blg span:hover {
        background: rgba(243, 156, 18, 0.2);
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app-navbar"></div>
    <main class="profile-battlelog">
      <div class="profile-header-blg">
        <div class="avatar-blg">
          <span id="avatarDisplay"></span>
          <div class="avatar-edit" id="editAvatarBtn">✏️</div>
        </div>
        <div class="profile-info-blg">
          <h2 id="profileNickname">Caricamento...</h2>
          <p class="bio" id="profileBio">Operativo. Pronto per il campo.</p>
          <div class="avatar-selector-blg hidden" id="avatarSelector">
            <span data-avatar="🪖"></span><span data-avatar="🎯">🎯</span
            ><span data-avatar="">🦊</span> <span data-avatar="🐺">🐺</span
            ><span data-avatar="🦅"></span><span data-avatar="🛡️">🛡️</span>
          </div>
          <div class="profile-stats-blg">
            <div class="stat-box">
              <div class="num" id="postCount">0</div>
              <div class="label">POST</div>
            </div>
            <div class="stat-box">
              <div class="num">0</div>
              <div class="label">FOLLOWERS</div>
            </div>
            <div class="stat-box">
              <div class="num">0</div>
              <div class="label">FOLLOWING</div>
            </div>
          </div>
        </div>
      </div>
      <div id="teamBannerSection" class="team-banner-blg hidden">
        <img id="teamBannerImg" src="" alt="Banner Squadra" />
        <div class="team-info-blg">
          <span class="team-name-blg" id="teamNameDisplay"></span>
          <span class="subteams-blg" id="teamSubTeams"></span>
        </div>
      </div>
      <div class="posts-grid-blg" id="postsGrid">
        <p
          style="
            grid-column: 1/-1;
            text-align: center;
            color: #666;
            padding: 2rem;
          "
        >
          ⏳ Caricamento contenuti...
        </p>
      </div>
    </main>
    <script src="/js/profile.js"></script>
    <script src="/js/navbar.js"></script>
  </body>
</html>
