<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🪖 BE TACTIC - Feed</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .feed-blg {
        max-width: 800px;
        margin: 1rem auto;
        padding: 0 1rem;
      }
      .post-creator-blg {
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .post-creator-blg textarea {
        width: 100%;
        height: 80px;
        background: #0a0a0a;
        border: 1px solid #333;
        color: var(--text-white);
        padding: 0.8rem;
        font-family: var(--font-main);
        text-transform: none;
        resize: vertical;
        border-radius: 2px;
      }
      .post-creator-blg textarea:focus {
        outline: none;
        border-color: var(--accent-orange);
      }
      .post-actions-blg {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 0.5rem;
      }
      .post-actions-blg select {
        background: #0a0a0a;
        color: var(--text-white);
        border: 1px solid #333;
        padding: 0.4rem;
        border-radius: 2px;
      }
      .btn-publish {
        background: var(--accent-orange);
        color: #000;
        border: none;
        padding: 0.5rem 1.2rem;
        font-family: var(--font-main);
        font-weight: 700;
        cursor: pointer;
        border-radius: 2px;
        text-transform: uppercase;
      }
      .btn-publish:hover {
        background: var(--accent-gold);
      }
      .post-card-blg {
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .post-meta-blg {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
      }
      .post-type-badge {
        background: rgba(243, 156, 18, 0.2);
        color: var(--accent-orange);
        padding: 0.2rem 0.5rem;
        border-radius: 2px;
        font-size: 0.7rem;
      }
      .post-content-blg {
        line-height: 1.5;
        margin-bottom: 1rem;
        color: var(--text-white);
        text-transform: none;
      }
      .post-actions-bar-blg {
        display: flex;
        gap: 1rem;
        border-top: 1px solid #333;
        padding-top: 0.8rem;
      }
      .action-btn-blg {
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
        transition: color 0.2s;
      }
      .action-btn-blg:hover {
        color: var(--accent-orange);
      }
      .comments-section-blg {
        margin-top: 1rem;
        background: #0a0a0a;
        border-radius: 4px;
        padding: 0.8rem;
        display: none;
      }
      .comments-section-blg.active {
        display: block;
      }
      .comment-blg {
        padding: 0.5rem 0;
        border-bottom: 1px solid #222;
        font-size: 0.85rem;
        color: var(--text-muted);
        text-transform: none;
      }
      .comment-blg:last-child {
        border-bottom: none;
      }
      .comment-author-blg {
        color: var(--accent-orange);
        font-weight: 600;
      }
      .comment-input-wrap-blg {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.8rem;
      }
      .comment-input-wrap-blg input {
        flex: 1;
        background: #111;
        border: 1px solid #333;
        color: var(--text-white);
        padding: 0.5rem;
        border-radius: 2px;
      }
      #charCount {
        color: #666;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div id="app-navbar"></div>
    <main class="feed-blg">
      <section class="post-creator-blg">
        <textarea
          id="postContent"
          placeholder="Cosa è successo in campo oggi?"
        ></textarea>
        <div class="post-actions-blg">
          <select id="postType">
            <option value="generic">📝 GENERICO</option>
            <option value="match">⚔️ PARTITA</option>
            <option value="gear">🎒 EQUIPAGGIAMENTO</option>
            <option value="photo">FOTO/VIDEO</option>
          </select>
          <button id="publishBtn" class="btn-publish">🚀 PUBBLICA</button>
        </div>
        <span id="charCount">0/500</span>
      </section>
      <section id="feedContainer">
        <p style="text-align: center; color: #666; padding: 2rem">
          ⏳ Caricamento feed...
        </p>
      </section>
    </main>
    <script src="/js/feed.js"></script>
    <script src="/js/navbar.js"></script>
  </body>
</html>
