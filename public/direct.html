<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🪖 BE TACTIC - Direct</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .direct-layout-blg {
        display: grid;
        grid-template-columns: 300px 1fr;
        height: calc(100vh - 60px);
        gap: 1rem;
        padding: 1rem;
      }
      .direct-sidebar-blg {
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-header-blg {
        padding: 1rem;
        border-bottom: 1px solid var(--border-color);
      }
      .sidebar-header-blg h3 {
        font-size: 1rem;
        color: var(--accent-orange);
        margin: 0 0 0.5rem;
      }
      .search-box-blg {
        display: flex;
        gap: 0.5rem;
      }
      .search-box-blg input {
        flex: 1;
        padding: 0.6rem;
        background: #0a0a0a;
        border: 1px solid #333;
        color: var(--text-white);
        border-radius: 2px;
        font-family: var(--font-main);
      }
      .btn-search {
        background: var(--accent-orange);
        color: #000;
        border: none;
        width: 36px;
        cursor: pointer;
        border-radius: 2px;
      }
      .search-results-blg {
        position: absolute;
        top: 110px;
        left: 1rem;
        right: 340px;
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        max-height: 200px;
        overflow-y: auto;
        z-index: 10;
        display: none;
      }
      .search-result-item-blg {
        padding: 0.8rem 1rem;
        cursor: pointer;
        border-bottom: 1px solid #222;
        font-size: 0.9rem;
      }
      .search-result-item-blg:hover {
        background: rgba(243, 156, 18, 0.1);
      }
      .convo-list-blg {
        flex: 1;
        overflow-y: auto;
      }
      .convo-item-blg {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        padding: 0.8rem 1rem;
        cursor: pointer;
        border-bottom: 1px solid #222;
        transition: background 0.2s;
      }
      .convo-item-blg:hover,
      .convo-item-blg.active {
        background: rgba(243, 156, 18, 0.1);
      }
      .convo-avatar-blg {
        width: 40px;
        height: 40px;
        background: #222;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #444;
      }
      .convo-info-blg {
        flex: 1;
      }
      .convo-name-blg {
        font-weight: 600;
        font-size: 0.9rem;
      }
      .convo-preview-blg {
        font-size: 0.8rem;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .direct-chat-area-blg {
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .empty-state-blg {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
      }
      .empty-icon-blg {
        font-size: 3rem;
        opacity: 0.3;
        margin-bottom: 1rem;
      }
      .hidden {
        display: none !important;
      }
      .chat-header-blg {
        padding: 0.8rem 1rem;
        border-bottom: 1px solid var(--border-color);
        background: #111;
        font-weight: 600;
        font-size: 0.95rem;
      }
      .messages-container-blg {
        flex: 1;
        padding: 1rem;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .msg-bubble-blg {
        max-width: 70%;
        padding: 0.7rem 1rem;
        border-radius: 4px;
        font-size: 0.9rem;
        line-height: 1.4;
        text-transform: none;
      }
      .msg-bubble-blg.sent {
        align-self: flex-end;
        background: var(--accent-orange);
        color: #000;
      }
      .msg-bubble-blg.received {
        align-self: flex-start;
        background: #222;
        border: 1px solid #333;
      }
      .msg-time-blg {
        font-size: 0.7rem;
        color: #666;
        margin-top: 0.2rem;
        text-align: right;
      }
      .message-form-blg {
        display: flex;
        gap: 0.5rem;
        padding: 0.8rem 1rem;
        border-top: 1px solid var(--border-color);
        background: #111;
      }
      .message-form-blg input {
        flex: 1;
        padding: 0.7rem;
        background: #0a0a0a;
        border: 1px solid #333;
        color: var(--text-white);
        border-radius: 2px;
      }
      .btn-send-blg {
        background: var(--accent-orange);
        color: #000;
        border: none;
        width: 40px;
        border-radius: 2px;
        cursor: pointer;
        font-weight: 700;
      }
      @media (max-width: 768px) {
        .direct-layout-blg {
          grid-template-columns: 1fr;
        }
        .direct-sidebar-blg {
          height: 40vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-navbar"></div>
    <main class="direct-layout-blg">
      <aside class="direct-sidebar-blg">
        <header class="sidebar-header-blg">
          <h3>📩 MESSAGGI</h3>
          <div class="search-box-blg">
            <input
              type="text"
              id="searchUser"
              placeholder="Cerca operatore..."
            />
            <button id="startChatBtn" class="btn-search">➕</button>
          </div>
          <div id="searchResults" class="search-results-blg"></div>
        </header>
        <div id="convoList" class="convo-list-blg">
          <p style="text-align: center; color: #666; padding: 2rem">
            Caricamento...
          </p>
        </div>
      </aside>
      <section class="direct-chat-area-blg">
        <div id="emptyChat" class="empty-state-blg">
          <div class="empty-icon-blg">💬</div>
          <p>Seleziona una conversazione per iniziare</p>
        </div>
        <div id="activeChat" class="hidden">
          <header class="chat-header-blg">
            <span id="chatWithUser">👤 Utente</span>
          </header>
          <div id="messagesContainer" class="messages-container-blg"></div>
          <form id="messageForm" class="message-form-blg">
            <input
              type="text"
              id="messageInput"
              placeholder="Scrivi un messaggio..."
              autocomplete="off"
            />
            <button type="submit" class="btn-send-blg">📤</button>
          </form>
        </div>
      </section>
    </main>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/js/direct.js"></script>
    <script src="/js/navbar.js"></script>
  </body>
</html>
