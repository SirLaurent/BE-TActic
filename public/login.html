<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🪖 BE TACTIC - Accedi</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .auth-container {
        max-width: 450px;
        margin: 5rem auto;
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-top: 3px solid var(--accent-orange);
        border-radius: 4px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      }
      .auth-header {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .auth-header p {
        color: var(--text-muted);
        font-size: 0.85rem;
        text-transform: uppercase;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 0.3rem;
      }
      .form-group input {
        width: 100%;
        padding: 0.8rem;
        background: #0a0a0a;
        border: 1px solid #333;
        color: var(--text-white);
        font-family: var(--font-main);
        text-transform: none;
        border-radius: 2px;
        transition: border-color 0.2s;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--accent-orange);
      }
      .btn-submit {
        width: 100%;
        padding: 0.9rem;
        background: var(--accent-orange);
        color: #000;
        border: none;
        font-family: var(--font-main);
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 2px;
        transition: all 0.2s;
        letter-spacing: 1px;
      }
      .btn-submit:hover {
        background: var(--accent-gold);
        box-shadow: 0 0 15px rgba(243, 156, 18, 0.4);
      }
      .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      .auth-footer a {
        color: var(--accent-orange);
        text-decoration: none;
      }
      .auth-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-header">
        <h1 class="glitch-logo">BE TACTIC</h1>
        <p>Accesso al campo di battaglia</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label>EMAIL O NICKNAME</label
          ><input
            type="text"
            id="email"
            required
            placeholder="Inserisci credenziali..."
          />
        </div>
        <div class="form-group">
          <label>PASSWORD</label
          ><input
            type="password"
            id="password"
            required
            placeholder="••••••••"
          />
        </div>
        <button type="submit" class="btn-submit">ACCEDI AL SISTEMA</button>
      </form>
      <div class="auth-footer">
        <p>Non hai un account? <a href="/register">REGISTRATI ORA</a></p>
      </div>
    </div>
    <script src="/js/login.js"></script>
  </body>
</html>
